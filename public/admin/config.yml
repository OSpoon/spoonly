backend:
  name: git-gateway
  branch: main

media_folder: "public/assets/blog"
public_folder: "/assets/blog"

collections:
  - name: "blog"
    label: "Technical Blog"
    folder: "src/content/blog"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Publish Date", name: "pubDate", widget: "datetime", format: "YYYY-MM-DD" }
      - { label: "Hero Image", name: "heroImage", widget: "image", required: false }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "projects"
    label: "Open Source Projects"
    files:
      - label: "Projects List"
        name: "projects_list"
        file: "src/data/projects.json"
        fields:
          - label: "Projects"
            name: "projects"
            widget: "list"
            fields:
              - { label: "ID", name: "id", widget: "string" }
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Language", name: "language", widget: "select", options: ["Vue", "TypeScript", "JavaScript", "HTML", "CSS", "Go", "Node.js"] }
              - { label: "URL", name: "url", widget: "string" }
              - { label: "Stars", name: "stars", widget: "number", value_type: "int", required: false }

  - name: "bookmarks"
    label: "Digital Library (Bookmarks)"
    files:
      - label: "Bookmarks Data"
        name: "bookmarks_data"
        file: "src/data/bookmarks.json"
        fields:
          - label: "Bookmark Groups"
            name: "bookmarks"
            widget: "list"
            fields:
              - { label: "ID", name: "id", widget: "string" }
              - { label: "Category", name: "category", widget: "string" }
              - { label: "Items", name: "items", widget: "list", fields: [
                  { label: "ID", name: "id", widget: "string" },
                  { label: "Name", name: "name", widget: "string" },
                  { label: "URL", name: "url", widget: "string" },
                  { label: "Description", name: "desc", widget: "text", required: false }
                ]
              }

  - name: "about"
    label: "Profile & Experience"
    files:
      - label: "About Page Data"
        name: "about_page"
        file: "src/data/about.json"
        fields:
          - label: "Introduction"
            name: "intro"
            widget: "object"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Tagline", name: "tagline", widget: "string" }
              - { label: "Bio Paragraphs", name: "bio", widget: "list", field: { label: "Paragraph", name: "paragraph", widget: "text" } }
          - label: "Experience"
            name: "experience"
            widget: "list"
            fields:
              - { label: "Period", name: "period", widget: "string" }
              - { label: "Company", name: "company", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
          - label: "Skills"
            name: "skills"
            widget: "list"
            fields:
              - { label: "Category", name: "category", widget: "string" }
              - { label: "Items", name: "items", widget: "list", field: { label: "Skill", name: "skill", widget: "string" } }
          - label: "Connect"
            name: "connect"
            widget: "list"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "URL", name: "url", widget: "string" }
